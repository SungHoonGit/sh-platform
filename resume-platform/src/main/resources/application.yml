server:
  port: 8082

spring:
  application:
    name: resume-platform
  datasource:
    url: jdbc:mariadb://10.0.0.39:3306/resume_platform?useSSL=false&allowPublicKeyRetrieval=true
    username: sh_user
    password: SHpass1234!
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /api-docs-ui
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.resume.platform: DEBUG
