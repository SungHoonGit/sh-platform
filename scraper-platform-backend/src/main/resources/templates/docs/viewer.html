<!DOCTYPE html>
<html lang="ko" x-data="docViewer()" x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 뷰어 - Scraper Platform</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: #2c3e50; color: white; padding: 10px 20px; display: flex; align-items: center; gap: 16px; }
        .header h1 { font-size: 16px; font-weight: 600; }
        .search-box { flex: 1; max-width: 360px; }
        .search-box input { width: 100%; padding: 7px 12px; border: 1px solid #34495e; border-radius: 4px; background: #34495e; color: white; font-size: 13px; }
        .search-box input::placeholder { color: #95a5a6; }
        .search-box input:focus { outline: none; border-color: #3498db; }
        .header-right { display: flex; gap: 8px; }
        
        .container { display: flex; flex: 1; overflow: hidden; }
        
        .sidebar { width: 300px; background: #f5f5f5; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 10px 12px; border-bottom: 1px solid #ddd; font-weight: 600; color: #555; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; background: #eee; }
        .file-tree { flex: 1; overflow-y: auto; padding: 4px 0; font-size: 13px; }
        
        .tree-item { padding: 5px 8px; cursor: pointer; display: flex; align-items: center; white-space: nowrap; user-select: none; }
        .tree-item:hover { background: #e8e8e8; }
        .tree-item.active { background: #0078d4; color: white; }
        .tree-indent { display: inline-block; color: #aaa; user-select: none; font-family: monospace; }
        .tree-icon { display: inline-block; width: 18px; text-align: center; margin-right: 4px; font-size: 12px; }
        .tree-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
        .tree-meta { font-size: 11px; color: #999; margin-left: 8px; }
        .tree-item.active .tree-meta { color: rgba(255,255,255,0.7); }
        .tree-dir > .tree-name { font-weight: 500; }
        
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content-header { padding: 10px 20px; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 10px; background: white; }
        .content-header h2 { flex: 1; font-size: 14px; font-weight: 500; color: #333; }
        .btn { padding: 5px 12px; border: 1px solid #ccc; border-radius: 3px; background: white; cursor: pointer; font-size: 12px; color: #333; }
        .btn:hover { background: #f0f0f0; }
        .btn-primary { background: #0078d4; color: white; border-color: #0078d4; }
        .btn-primary:hover { background: #106ebe; }
        
        .content-body { flex: 1; overflow-y: auto; padding: 20px 24px; background: white; line-height: 1.6; }
        .content-body table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px; }
        .content-body th, .content-body td { padding: 8px 10px; border: 1px solid #ddd; text-align: left; }
        .content-body th { background: #f8f9fa; font-weight: 600; position: sticky; top: 0; }
        .content-body tr:hover { background: #f5f5f5; }
        .content-body a { color: #0078d4; text-decoration: none; }
        .content-body a:hover { text-decoration: underline; }
        .content-body h1 { font-size: 22px; margin-bottom: 12px; color: #1a1a1a; }
        .content-body h2 { font-size: 18px; margin: 18px 0 10px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        .content-body h3 { font-size: 15px; margin: 14px 0 8px; color: #555; }
        .content-body p { margin: 8px 0; }
        
        .search-results { padding: 20px; }
        .search-results h3 { margin-bottom: 16px; color: #333; font-size: 14px; }
        .search-result { margin-bottom: 12px; padding: 12px; background: #f8f9fa; border-radius: 4px; border-left: 3px solid #0078d4; }
        .search-result .file { font-weight: 500; color: #0078d4; margin-bottom: 4px; cursor: pointer; font-size: 13px; }
        .search-result .file:hover { text-decoration: underline; }
        .search-result .line { font-size: 11px; color: #888; margin-bottom: 4px; }
        .search-result .content { font-size: 13px; }
        .search-result mark { background: #fff3cd; padding: 1px 2px; border-radius: 2px; }
        
        .loading { display: flex; align-items: center; justify-content: center; height: 60px; color: #888; font-size: 13px; }
        .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #999; gap: 8px; }
        .empty-icon { font-size: 40px; }
        .empty-text { font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>문서 뷰어</h1>
        <div class="search-box">
            <input type="text" 
                   x-model="searchQuery" 
                   @keyup.enter="search()" 
                   placeholder="검색어 입력 (예: 백엔드, Spring, React)">
        </div>
        <div class="header-right">
            <button class="btn btn-primary" @click="search()">검색</button>
            <button class="btn" @click="resetView()">초기화</button>
        </div>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">파일 탐색기</div>
            <div class="file-tree">
                <template x-if="loading">
                    <div class="loading">로딩 중...</div>
                </template>
                <template x-for="item in visibleItems" :key="item.path">
                    <div class="tree-item"
                         :class="{
                            'active': currentFile === item.path,
                            'tree-dir': item.type === 'directory'
                         }"
                         :style="'padding-left: ' + (item.depth * 16 + 8) + 'px'"
                         @click="item.type === 'file' ? loadFile(item.path) : toggleDir(item)">
                        <span class="tree-icon" x-text="getIcon(item)"></span>
                        <span class="tree-name" x-text="item.name"></span>
                        <span class="tree-meta" x-show="item.type === 'file'" x-text="formatSize(item.size)"></span>
                        <span class="tree-meta" x-show="item.type === 'directory'" x-text="item.childCount + '개'"></span>
                    </div>
                </template>
            </div>
        </div>
        
        <div class="content">
            <div class="content-header" x-show="currentFile">
                <h2 x-text="currentTitle"></h2>
                <button class="btn" @click="exportPdf()">PDF</button>
                <button class="btn" @click="exportExcel()">Excel</button>
            </div>
            
            <div class="content-body" x-show="currentFile && !searchMode" x-html="currentContent"></div>
            
            <div class="search-results" x-show="searchMode">
                <h3 x-text="'검색 결과: ' + searchResults.length + '건'"></h3>
                <template x-for="result in searchResults" :key="result.file + result.line">
                    <div class="search-result">
                        <div class="file" x-text="result.file" @click="loadFile(result.file)"></div>
                        <div class="line" x-text="'라인 ' + result.line"></div>
                        <div class="content" x-html="result.highlight"></div>
                    </div>
                </template>
            </div>
            
            <div class="empty" x-show="!currentFile && !searchMode">
                <div class="empty-icon">📂</div>
                <div class="empty-text">왼쪽에서 파일을 선택하세요</div>
            </div>
        </div>
    </div>

    <script>
        function docViewer() {
            return {
                rootPath: '/home/ubuntu/job-scraper/daily',
                allItems: [],
                expandedDirs: { '.': true, 'java': true, 'react': true },
                currentFile: null,
                currentTitle: '',
                currentContent: '',
                searchQuery: '',
                searchResults: [],
                searchMode: false,
                loading: false,

                async init() {
                    await this.loadTree();
                },

                get visibleItems() {
                    const items = [];
                    const skipUntilDepth = {};  // depth -> skip if parent not expanded
                    
                    for (const item of this.allItems) {
                        // Check if this item's parent was collapsed
                        const parentPath = this.getParentPath(item.path);
                        const parentKey = parentPath === '.' ? '.' : parentPath;
                        
                        if (skipUntilDepth[item.depth] && item.depth >= skipUntilDepth[item.depth]) {
                            continue;
                        }
                        
                        // If parent is a directory that's collapsed, skip
                        if (item.depth > 0 && !this.expandedDirs[parentKey]) {
                            skipUntilDepth[item.depth] = item.depth;
                            continue;
                        }
                        
                        items.push(item);
                        
                        // If this is a collapsed directory, mark to skip its children
                        if (item.type === 'directory' && !this.expandedDirs[item.path]) {
                            skipUntilDepth[item.depth + 1] = item.depth + 1;
                        }
                    }
                    return items;
                },

                getParentPath(path) {
                    if (path === '.' || !path) return '.';
                    const parts = path.split('/');
                    if (parts.length <= 1) return '.';
                    return parts.slice(0, -1).join('/') || '.';
                },

                async loadTree() {
                    this.loading = true;
                    try {
                        const response = await fetch(`/scraper/docs/tree/view?rootPath=${encodeURIComponent(this.rootPath)}`);
                        this.allItems = await response.json();
                    } catch (error) {
                        console.error('Error loading tree:', error);
                    }
                    this.loading = false;
                },

                getIcon(item) {
                    if (item.type === 'directory') {
                        return this.expandedDirs[item.path] ? '📂' : '📁';
                    }
                    if (item.name.endsWith('.md')) return '📄';
                    return '📋';
                },

                toggleDir(item) {
                    const wasExpanded = !!this.expandedDirs[item.path];
                    
                    if (wasExpanded) {
                        // Collapse: remove this dir and all descendant dirs
                        delete this.expandedDirs[item.path];
                        const prefix = item.path + '/';
                        Object.keys(this.expandedDirs).forEach(key => {
                            if (key.startsWith(prefix)) {
                                delete this.expandedDirs[key];
                            }
                        });
                    } else {
                        // Expand
                        this.expandedDirs[item.path] = true;
                    }
                    
                    // Force Alpine reactivity
                    this.expandedDirs = { ...this.expandedDirs };
                },

                async loadFile(path) {
                    this.searchMode = false;
                    this.currentFile = path;
                    try {
                        const response = await fetch(`/scraper/docs/file?rootPath=${encodeURIComponent(this.rootPath)}&path=${encodeURIComponent(path)}&format=html`);
                        const data = await response.json();
                        this.currentTitle = data.title;
                        this.currentContent = data.content.replace(/<a href/g, '<a target="_blank" rel="noopener noreferrer" href');
                    } catch (error) {
                        console.error('Error loading file:', error);
                    }
                },

                async search() {
                    if (!this.searchQuery.trim()) return;
                    this.searchMode = true;
                    this.currentFile = null;
                    try {
                        const response = await fetch(`/scraper/docs/search?rootPath=${encodeURIComponent(this.rootPath)}&q=${encodeURIComponent(this.searchQuery)}`);
                        const data = await response.json();
                        this.searchResults = data.results;
                    } catch (error) {
                        console.error('Error searching:', error);
                    }
                },

                resetView() {
                    this.searchMode = false;
                    this.currentFile = null;
                    this.currentTitle = '';
                    this.currentContent = '';
                    this.searchResults = [];
                },

                exportPdf() {
                    window.open(`/scraper/docs/export/pdf?rootPath=${encodeURIComponent(this.rootPath)}&path=${encodeURIComponent(this.currentFile)}`, '_blank');
                },

                exportExcel() {
                    window.open(`/scraper/docs/export/excel?rootPath=${encodeURIComponent(this.rootPath)}&path=${encodeURIComponent(this.currentFile)}`, '_blank');
                },

                formatSize(bytes) {
                    if (bytes < 1024) return bytes + 'B';
                    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
                    return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
                }
            };
        }
    </script>
</body>
</html>
