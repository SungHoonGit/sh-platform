<!DOCTYPE html>
<html lang="ko" x-data="docViewer()" x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>л¬ём„ң л·°м–ҙ - Scraper Platform</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: #1a1a2e; color: white; padding: 12px 20px; display: flex; align-items: center; gap: 20px; }
        .header h1 { font-size: 18px; font-weight: 500; }
        .search-box { flex: 1; max-width: 400px; }
        .search-box input { width: 100%; padding: 8px 12px; border: none; border-radius: 4px; background: #16213e; color: white; }
        .search-box input::placeholder { color: #888; }
        
        .container { display: flex; flex: 1; overflow: hidden; }
        
        .sidebar { width: 320px; background: #1e1e1e; color: #d4d4d4; display: flex; flex-direction: column; border-right: 1px solid #333; }
        .sidebar-header { padding: 12px; border-bottom: 1px solid #333; font-weight: 500; color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .file-tree { flex: 1; overflow-y: auto; padding: 8px 0; font-family: 'Consolas', 'Monaco', monospace; font-size: 13px; }
        
        .tree-item { padding: 4px 8px; cursor: pointer; display: flex; align-items: center; white-space: nowrap; }
        .tree-item:hover { background: #2a2d2e; }
        .tree-item.active { background: #264f78; color: white; }
        .tree-indent { display: inline-block; color: #555; user-select: none; }
        .tree-icon { display: inline-block; width: 16px; text-align: center; margin-right: 4px; }
        .tree-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
        .tree-meta { font-size: 11px; color: #666; margin-left: 8px; }
        .tree-dir > .tree-name { color: #dcdcaa; }
        .tree-file > .tree-name { color: #ce9178; }
        .tree-file.md > .tree-name { color: #4ec9b0; }
        
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content-header { padding: 12px 20px; border-bottom: 1px solid #dee2e6; display: flex; align-items: center; gap: 12px; background: white; }
        .content-header h2 { flex: 1; font-size: 16px; font-weight: 500; }
        .btn { padding: 6px 12px; border: 1px solid #dee2e6; border-radius: 4px; background: white; cursor: pointer; font-size: 13px; }
        .btn:hover { background: #f8f9fa; }
        .btn-primary { background: #0d6efd; color: white; border-color: #0d6efd; }
        .btn-primary:hover { background: #0b5ed7; }
        
        .content-body { flex: 1; overflow-y: auto; padding: 20px; background: white; }
        .content-body table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
        .content-body th, .content-body td { padding: 8px 12px; border: 1px solid #dee2e6; text-align: left; }
        .content-body th { background: #f8f9fa; font-weight: 600; position: sticky; top: 0; }
        .content-body tr:hover { background: #f8f9fa; }
        .content-body a { color: #0d6efd; text-decoration: none; }
        .content-body a:hover { text-decoration: underline; }
        .content-body h1 { font-size: 24px; margin-bottom: 16px; color: #1a1a2e; }
        .content-body h2 { font-size: 20px; margin: 20px 0 12px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .content-body h3 { font-size: 16px; margin: 16px 0 8px; color: #666; }
        .content-body p { margin: 8px 0; line-height: 1.6; }
        
        .search-results { padding: 20px; }
        .search-results h3 { margin-bottom: 16px; color: #333; }
        .search-result { margin-bottom: 16px; padding: 12px; background: #f8f9fa; border-radius: 4px; border-left: 3px solid #0d6efd; }
        .search-result .file { font-weight: 500; color: #0d6efd; margin-bottom: 4px; cursor: pointer; }
        .search-result .file:hover { text-decoration: underline; }
        .search-result .line { font-size: 12px; color: #888; margin-bottom: 4px; }
        .search-result .content { font-size: 14px; }
        .search-result mark { background: #fff3cd; padding: 1px 2px; border-radius: 2px; }
        
        .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #888; }
        .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #888; gap: 8px; }
        .empty-icon { font-size: 48px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>л¬ём„ң л·°м–ҙ</h1>
        <div class="search-box">
            <input type="text" 
                   x-model="searchQuery" 
                   @keyup.enter="search()" 
                   placeholder="кІҖмғүм–ҙлҘј мһ…л Ҙн•ҳм„ёмҡ” (мҳҲ: л°ұм—”л“ң, Spring)">
        </div>
        <button class="btn btn-primary" @click="search()">кІҖмғү</button>
        <button class="btn" @click="searchMode = false; currentFile = null; loadTree()">мҙҲкё°нҷ”</button>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">нҢҢмқј нғҗмғүкё°</div>
            <div class="file-tree">
                <template x-if="loading">
                    <div class="loading">лЎңл”© мӨ‘...</div>
                </template>
                <template x-for="item in treeItems" :key="item.path">
                    <div class="tree-item"
                         :class="{
                            'active': currentFile === item.path,
                            'tree-dir': item.type === 'directory',
                            'tree-file': item.type === 'file',
                            'md': item.name.endsWith('.md')
                         }"
                         :style="'padding-left: ' + (item.depth * 16 + 8) + 'px'"
                         @click="item.type === 'file' ? loadFile(item.path) : toggleDir(item.path)">
                        <span class="tree-indent" x-text="getTreePrefix(item)"></span>
                        <span class="tree-icon" x-text="item.type === 'directory' ? (expandedDirs.includes(item.path) ? 'в–ј' : 'в–¶') : (item.name.endsWith('.md') ? 'в—ү' : 'в—Ӣ')"></span>
                        <span class="tree-name" x-text="item.name"></span>
                        <span class="tree-meta" x-show="item.type === 'file'" x-text="formatSize(item.size)"></span>
                        <span class="tree-meta" x-show="item.type === 'directory'" x-text="item.childCount + 'к°ң'"></span>
                    </div>
                </template>
            </div>
        </div>
        
        <div class="content">
            <div class="content-header" x-show="currentFile">
                <h2 x-text="currentTitle"></h2>
                <button class="btn" @click="exportPdf()">PDF лӢӨмҡҙлЎңл“ң</button>
                <button class="btn" @click="exportExcel()">Excel лӢӨмҡҙлЎңл“ң</button>
            </div>
            
            <div class="content-body" x-show="currentFile && !searchMode" x-html="currentContent"></div>
            
            <div class="search-results" x-show="searchMode">
                <h3 x-text="'кІҖмғү кІ°кіј: ' + searchResults.length + 'кұҙ'"></h3>
                <template x-for="result in searchResults" :key="result.file + result.line">
                    <div class="search-result">
                        <div class="file" x-text="result.file" @click="loadFile(result.file)"></div>
                        <div class="line" x-text="'лқјмқё ' + result.line"></div>
                        <div class="content" x-html="result.highlight"></div>
                    </div>
                </template>
            </div>
            
            <div class="empty" x-show="!currentFile && !searchMode">
                <div class="empty-icon">рҹ“Ӯ</div>
                <p>мҷјмӘҪм—җм„ң нҢҢмқјмқ„ м„ нғқн•ҳм„ёмҡ”</p>
            </div>
        </div>
    </div>

    <script>
        function docViewer() {
            return {
                rootPath: '/home/ubuntu/job-scraper/daily/java',
                treeItems: [],
                currentFile: null,
                currentTitle: '',
                currentContent: '',
                searchQuery: '',
                searchResults: [],
                searchMode: false,
                loading: false,
                expandedDirs: [],

                async init() {
                    await this.loadTree();
                },

                async loadTree() {
                    this.loading = true;
                    try {
                        const response = await fetch(`/scraper/docs/tree/view?rootPath=${encodeURIComponent(this.rootPath)}`);
                        this.treeItems = await response.json();
                        // Auto-expand root
                        if (this.treeItems.length > 0 && this.treeItems[0].type === 'directory') {
                            this.expandedDirs.push(this.treeItems[0].path);
                        }
                    } catch (error) {
                        console.error('Error loading tree:', error);
                    }
                    this.loading = false;
                },

                getTreePrefix(item) {
                    if (item.depth === 0) return '';
                    let prefix = '';
                    for (let i = 0; i < item.depth - 1; i++) {
                        prefix += 'в”Ӯ  ';
                    }
                    prefix += item.isLast ? 'в””в”Җ ' : 'в”ңв”Җ ';
                    return prefix;
                },

                toggleDir(path) {
                    if (this.expandedDirs.includes(path)) {
                        this.expandedDirs = this.expandedDirs.filter(d => d !== path);
                    } else {
                        this.expandedDirs.push(path);
                    }
                },

                async loadFile(path) {
                    this.searchMode = false;
                    this.currentFile = path;
                    try {
                        const response = await fetch(`/scraper/docs/file?rootPath=${encodeURIComponent(this.rootPath)}&path=${encodeURIComponent(path)}&format=html`);
                        const data = await response.json();
                        this.currentTitle = data.title;
                        this.currentContent = data.content;
                    } catch (error) {
                        console.error('Error loading file:', error);
                    }
                },

                async search() {
                    if (!this.searchQuery.trim()) return;
                    this.searchMode = true;
                    this.currentFile = null;
                    try {
                        const response = await fetch(`/scraper/docs/search?rootPath=${encodeURIComponent(this.rootPath)}&q=${encodeURIComponent(this.searchQuery)}`);
                        const data = await response.json();
                        this.searchResults = data.results;
                    } catch (error) {
                        console.error('Error searching:', error);
                    }
                },

                exportPdf() {
                    window.open(`/scraper/docs/export/pdf?rootPath=${encodeURIComponent(this.rootPath)}&path=${encodeURIComponent(this.currentFile)}`, '_blank');
                },

                exportExcel() {
                    window.open(`/scraper/docs/export/excel?rootPath=${encodeURIComponent(this.rootPath)}&path=${encodeURIComponent(this.currentFile)}`, '_blank');
                },

                formatSize(bytes) {
                    if (bytes < 1024) return bytes + 'B';
                    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
                    return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
                }
            };
        }
    </script>
</body>
</html>
