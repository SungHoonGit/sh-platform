# Auth
DUPLICATE_EMAIL=이미 사용 중인 이메일입니다.
UNAUTHORIZED=이메일 또는 비밀번호가 올바르지 않습니다.
EMAIL_NOT_VERIFIED=이메일 인증이 완료되지 않았습니다.
TOKEN_EXPIRED=토큰이 만료되었습니다. 다시 로그인해주세요.
TOKEN_INVALID=유효하지 않은 토큰입니다.
INVALID_CODE=인증 코드가 올바르지 않습니다.
CODE_EXPIRED=인증 코드가 만료되었습니다.

# OAuth2
OAUTH2_FAILED=소셜 로그인에 실패했습니다.
OAUTH2_USER_NOT_FOUND=소셜 로그인 사용자를 찾을 수 없습니다.
OAUTH2_PROVIDER_ERROR=소셜 로그인 제공자와 통신 중 오류가 발생했습니다.
RATE_LIMITED=요청이 너무 많습니다. 잠시 후 다시 시도해주세요.

# Common
INTERNAL_ERROR=서버 오류가 발생했습니다.
NOT_FOUND=요청하신 리소스를 찾을 수 없습니다.
INVALID_INPUT=입력값이 올바르지 않습니다.
FORBIDDEN=접근 권한이 없습니다.

# Account Link
PROVIDER_ALREADY_LINKED=이미 연결된 프로바이더입니다.
PROVIDER_NOT_FOUND=연결된 프로바이더를 찾을 수 없습니다.
LAST_PROVIDER_CANNOT_UNLINK=마지막 프로바이더는 연결 해제할 수 없습니다.
