spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  messages:
    basename: messages/messages
    encoding: UTF-8
    fallback-to-system-locale: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_batch_fetch_size: 100
        format_sql: true
        show_sql: false

  threads:
    virtual:
      enabled: true

server:
  shutdown: graceful
  forward-headers-strategy: framework

oauth2:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  callback-base: ${OAUTH2_CALLBACK_BASE:http://localhost:8080}

logging:
  level:
    com.shplatform: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: sh-platform-auth
