name: Deploy Scraper Platform

on:
  push:
    branches: [main]
    paths:
      - "scraper-platform-backend/**"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build and Test with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :scraper-platform-backend:build

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: scraper-test-report
          path: "**/build/reports/tests/test/"

      - name: Upload Javadoc
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: scraper-javadoc
          path: "**/build/docs/javadoc/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_WEB_HOST }}
          username: ${{ secrets.OCI_SSH_USER }}
          password: ${{ secrets.OCI_SSH_PW }}
          script: |
            set -e

            cd /home/ubuntu/sh-platform
            git pull origin main

            ./gradlew :scraper-platform-backend:clean :scraper-platform-backend:build -q
            ./gradlew :scraper-platform-backend:javadoc -q

            # Restart scraper-platform
            pkill -f "scraper-platform" 2>/dev/null || true
            sleep 2
            cd scraper-platform-backend
            nohup ../gradlew :scraper-platform-backend:bootRun --args="--server.port=8081" > /home/ubuntu/data/scraper-platform.log 2>&1 &

            echo "Deploy complete!"
