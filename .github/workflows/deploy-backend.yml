name: Deploy Backend (Spring Boot)

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/**"
      - "sh-platform-auth/**"
      - "sh-platform-common/**"
      - "modules/auth/**"
      - "modules/scraper/**"
      - "modules/resume/**"
      - "modules/portfolio/**"
      - "platform/**"
      - "common/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build and Test with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :modules:auth:backend:build :modules:scraper:backend:build

      - name: Build Frontend (scraper)
        run: |
          cd modules/scraper/frontend
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Build Frontend (platform)
        run: |
          cd platform/frontend
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-report
          path: "**/build/reports/tests/test/"

      - name: Test SSH auth
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass >/dev/null 2>&1
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 \
            "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "hostname"

      - name: Deploy step 1 - stop + cd + git pull
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 \
            "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "
            set -e
            echo OK_STOP
            sudo systemctl stop sh-platform 2>/dev/null || true
            echo OK_CD
            ls -la /home/ubuntu/sh-platform/.git/HEAD
            echo OK_GIT
            git -C /home/ubuntu/sh-platform pull origin master
            echo OK_PULL_DONE
          "

      - name: Deploy step 2 - Gradle build
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=300 \
            "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "
            cd /home/ubuntu/sh-platform
            ./gradlew :modules:auth:backend:clean :modules:auth:backend:build :modules:scraper:backend:build -q
          "

      - name: Deploy step 3 - frontend build + restart
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=300 \
            "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "
            set -e
            echo OK_FE_SCRAPER
            cd /home/ubuntu/sh-platform/modules/scraper/frontend
            npm ci && npx tsc --noEmit && npm run build

            echo OK_FE_PLATFORM
            cd /home/ubuntu/sh-platform/platform/frontend
            npm ci && npx tsc --noEmit && npm run build

            echo OK_START
            sudo systemctl start sh-platform

            echo '=== DEPLOY COMPLETE ==='
          "
