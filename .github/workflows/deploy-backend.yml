name: Deploy Backend (Spring Boot)

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/**"
      - "sh-platform-auth/**"
      - "sh-platform-common/**"
      - "modules/auth/**"
      - "modules/scraper/**"
      - "modules/resume/**"
      - "modules/portfolio/**"
      - "platform/**"
      - "common/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build and Test with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :modules:auth:backend:build :modules:scraper:backend:build

      - name: Build Frontend (scraper)
        run: |
          cd modules/scraper/frontend
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Build Frontend (platform)
        run: |
          cd platform/frontend
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-report
          path: "**/build/reports/tests/test/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_WEB_HOST }}
          username: ${{ secrets.OCI_SSH_USER }}
          password: ${{ secrets.OCI_SSH_PW }}
          script: |
            set -e

            sudo systemctl stop sh-platform 2>/dev/null || true

            cd /home/ubuntu/sh-platform
            git pull origin master

            ./gradlew :modules:auth:backend:clean :modules:auth:backend:build :modules:scraper:backend:build -q

            cd /home/ubuntu/sh-platform/modules/scraper/frontend
            npm ci && npx tsc --noEmit && npm run build

            cd /home/ubuntu/sh-platform/platform/frontend
            npm ci && npx tsc --noEmit && npm run build

            sudo systemctl start sh-platform
            echo "Deploy complete!"
