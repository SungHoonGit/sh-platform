name: Deploy Backend (Spring Boot)

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/**"
      - "sh-platform-auth/**"
      - "sh-platform-common/**"
      - "modules/auth/**"
      - "modules/scraper/**"
      - "modules/resume/**"
      - "modules/portfolio/**"
      - "platform/**"
      - "common/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build and Test with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :modules:auth:backend:build :modules:scraper:backend:build

      - name: Build Frontend (scraper)
        run: |
          cd modules/scraper/frontend
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Build Frontend (platform)
        run: |
          cd platform/frontend
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-report
          path: "**/build/reports/tests/test/"

      - name: Deploy via SSH
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass >/dev/null 2>&1

          user="${{ secrets.OCI_SSH_USER }}"
          host="${{ secrets.OCI_WEB_HOST }}"
          conn="-o StrictHostKeyChecking=accept-new"

          # Stop services
          sshpass -e ssh $conn -o ConnectTimeout=30 "${user}@${host}" "sudo systemctl stop sh-platform 2>/dev/null; echo STOP_DONE"

          # Git pull
          sshpass -e ssh $conn -o ConnectTimeout=30 "${user}@${host}" "git -C /home/ubuntu/sh-platform pull origin master"

          # Gradle build
          sshpass -e ssh $conn -o ConnectTimeout=300 "${user}@${host}" "cd /home/ubuntu/sh-platform && ./gradlew :modules:auth:backend:clean :modules:auth:backend:build :modules:scraper:backend:build -q"

          # Frontend scraper
          sshpass -e ssh $conn -o ConnectTimeout=300 "${user}@${host}" "cd /home/ubuntu/sh-platform/modules/scraper/frontend && npm ci && npx tsc --noEmit && npm run build"

          # Frontend platform
          sshpass -e ssh $conn -o ConnectTimeout=300 "${user}@${host}" "cd /home/ubuntu/sh-platform/platform/frontend && npm ci && npx tsc --noEmit && npm run build"

          # Start services
          sshpass -e ssh $conn -o ConnectTimeout=30 "${user}@${host}" "sudo systemctl start sh-platform && echo DEPLOY_COMPLETE"
