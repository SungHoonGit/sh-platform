name: Deploy Backend (Spring Boot)

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/**"
      - "sh-platform-auth/**"
      - "sh-platform-common/**"
      - "modules/auth/**"
      - "modules/scraper/**"
      - "modules/resume/**"
      - "modules/portfolio/**"
      - "platform/**"
      - "common/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build and Test with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :modules:auth:backend:build :modules:scraper:backend:build

      - name: Build Frontend (scraper)
        run: |
          cd modules/scraper/frontend
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Build Frontend (platform)
        run: |
          cd platform/frontend
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-report
          path: "**/build/reports/tests/test/"

      - name: Deploy via SSH
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: |
          export SSHPASS="${{ secrets.OCI_SSH_PW }}"
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

          ssh() { sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "$@"; }

          echo "=== 1/6 Stop ===" && ssh "sudo systemctl stop sh-platform 2>/dev/null; echo Y"

          echo "=== 2/6 Deploy backend ===" && ssh "cd /home/ubuntu/sh-platform && git pull origin master && ./gradlew :modules:auth:backend:clean :modules:auth:backend:build :modules:scraper:backend:build -q"

          echo "=== 3/6 Frontend scraper ===" && ssh "cd /home/ubuntu/sh-platform/modules/scraper/frontend && npm ci && npx tsc --noEmit && npm run build"

          echo "=== 4/6 Frontend platform ===" && ssh "cd /home/ubuntu/sh-platform/platform/frontend && npm ci && npx tsc --noEmit && npm run build"

          echo "=== 5/6 Start ===" && ssh "sudo systemctl start sh-platform"

          echo "=== DEPLOY COMPLETE ==="
