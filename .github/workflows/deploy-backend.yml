name: Deploy Backend (Spring Boot)

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/**"
      - "sh-platform-auth/**"
      - "sh-platform-common/**"
      - "modules/auth/**"
      - "modules/scraper/**"
      - "modules/resume/**"
      - "modules/portfolio/**"
      - "platform/**"
      - "common/**"
      - "scripts/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build and Test with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :modules:auth:backend:build :modules:scraper:backend:build

      - name: Create common frontend symlinks
        run: |
          ln -sf ../../../../common/frontend/src modules/scraper/frontend/src/common
          ln -sf ../../../common/frontend/src platform/frontend/src/common
          ls -la modules/scraper/frontend/src/common platform/frontend/src/common

      - name: Build Frontend (scraper)
        run: |
          cd modules/scraper/frontend
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Build Frontend (platform)
        run: |
          cd platform/frontend
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-report
          path: "**/build/reports/tests/test/"

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Stop services
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "sudo systemctl stop sh-platform-auth sh-platform-scraper 2>/dev/null; sudo fuser -k 8080/tcp 8081/tcp 2>/dev/null; echo STOP_OK"

      - name: Git pull via HTTPS
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "cd /home/ubuntu/sh-platform && git remote set-url origin https://github.com/SungHoonGit/sh-platform.git && git stash 2>/dev/null; git fetch origin 2>&1; git reset --hard origin/master 2>&1"

      - name: Build backend
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=300 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "cd /home/ubuntu/sh-platform && ./gradlew :modules:auth:backend:clean :modules:auth:backend:build :modules:scraper:backend:build -q"

      - name: Build frontend scraper
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=300 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "cd /home/ubuntu/sh-platform && ln -sf ../../../../common/frontend/src modules/scraper/frontend/src/common && ln -sf ../../../common/frontend/src platform/frontend/src/common && cd modules/scraper/frontend && npm ci && npx tsc --noEmit && npm run build"

      - name: Build frontend platform
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=300 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "cd /home/ubuntu/sh-platform && ln -sf ../../../../common/frontend/src modules/scraper/frontend/src/common && ln -sf ../../../common/frontend/src platform/frontend/src/common && cd platform/frontend && npm ci && npx tsc --noEmit && npm run build"

      - name: Fix nginx (SPA fallback + scraper-ui location)
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "cd /home/ubuntu/sh-platform && python3 scripts/fix-nginx.py"

      - name: Diagnose services
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=120 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" << 'REMOTE'
            echo '=== service status ==='
            sudo systemctl status sh-platform-auth --no-pager 2>&1 || echo '(no sh-platform-auth service)'
            echo
            echo '=== unit file ==='
            sudo systemctl cat sh-platform-auth 2>&1 || echo '(no unit)'
            echo
            echo '=== JARs ==='
            ls -la /home/ubuntu/sh-platform/modules/auth/backend/build/libs/
            ls -la /home/ubuntu/sh-platform/modules/scraper/backend/build/libs/
            echo
            echo '=== port 8080 ==='
            ss -tlnp | grep 8080 || echo '(nothing on 8080)'
            echo
            echo '=== .env SPRING_PROFILES ==='
            grep -i profile /home/ubuntu/sh-platform/.env 2>/dev/null || echo '(not set in .env)'
          REMOTE

      - name: Start services
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" << 'REMOTE'
            AUTH_JAR=$(ls /home/ubuntu/sh-platform/modules/auth/backend/build/libs/*.jar 2>/dev/null | grep -v plain | head -1)
            SCRAPER_JAR=$(ls /home/ubuntu/sh-platform/modules/scraper/backend/build/libs/*.jar 2>/dev/null | grep -v plain | head -1)

            echo "=== JAR files ==="
            echo "auth: $AUTH_JAR"
            echo "scraper: $SCRAPER_JAR"

            start_jar() {
              JAR="$1"
              NAME="$2"
              PORT="$3"
              if [ -f "$JAR" ]; then
                echo "Starting $NAME from $JAR (port $PORT) ..."
                cd /home/ubuntu/sh-platform
                export SPRING_PROFILES_ACTIVE=prod
                nohup java -jar "$JAR" > /tmp/$NAME.log 2>&1 &
                echo "  PID: $!"
              else
                echo "JAR for $NAME not found at $JAR"
                return 1
              fi
            }

            start_jar "$AUTH_JAR" "auth" "8080"
            start_jar "$SCRAPER_JAR" "scraper" "8081"

            echo "=== Waiting 30s for startup ==="
            sleep 30

            echo "=== Java processes ==="
            ps aux | grep java || echo "(no java)"

            echo "=== auth log (tail 50) ==="
            tail -50 /tmp/auth.log 2>/dev/null || echo "(no auth log)"

            echo "=== scraper log (tail 20) ==="
            tail -20 /tmp/scraper.log 2>/dev/null || echo "(no scraper log)"

            echo "=== Port 8080 ==="
            ss -tlnp | grep 8080 || echo "(nothing on 8080)"

            echo "=== Port 8081 ==="
            ss -tlnp | grep 8081 || echo "(nothing on 8081)"

            echo "=== Health check (auth) ==="
            for i in $(seq 1 18); do
              code=$(python3 -c "
            import urllib.request
            class NoRedirect(urllib.request.HTTPRedirectHandler):
                def redirect_request(self, req, fp, code, msg, hdrs, newurl):
                    return None
            opener = urllib.request.build_opener(NoRedirect)
            try:
                resp = opener.open('http://localhost:8080/api/v1/auth/me', timeout=5)
                print(resp.status)
            except urllib.error.HTTPError as e:
                print(e.code)
            except:
                print('ERR')
            " 2>/dev/null)
              if [ -n "$code" ] && [ "$code" != "ERR" ]; then
                echo "Auth up ($code)"
                cp /tmp/auth.log /home/ubuntu/sh-platform/auth.log
                exit 0
              fi
              echo "Waiting... ($i/18)"
              sleep 10
            done
            echo "Auth failed"
            exit 1
          REMOTE

      - name: Collect diagnostics (always)
        if: always()
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" << 'REMOTE' 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
            echo "=== java processes ==="
            ps aux | grep java 2>/dev/null || echo "(no java)"
            echo "=== port 8080 ==="
            ss -tlnp | grep 8080 2>/dev/null || echo "(nothing on 8080)"
            echo "=== auth log ==="
            cat /tmp/auth.log 2>/dev/null || echo "(no /tmp/auth.log)"
            echo "=== .env ==="
            cat /home/ubuntu/sh-platform/.env 2>/dev/null || echo "(no .env)"
            echo "=== java version ==="
            java -version 2>&1 || echo "(no java)"
          REMOTE
