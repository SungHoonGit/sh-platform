name: Deploy Backend (Spring Boot)

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/**"
      - "sh-platform-auth/**"
      - "sh-platform-common/**"
      - "modules/auth/**"
      - "modules/scraper/**"
      - "modules/resume/**"
      - "modules/portfolio/**"
      - "platform/**"
      - "common/**"
      - "scripts/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build and Test with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :modules:auth:backend:build :modules:scraper:backend:build

      - name: Build Frontend (scraper)
        run: |
          cd modules/scraper/frontend
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Build Frontend (platform)
        run: |
          cd platform/frontend
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-report
          path: "**/build/reports/tests/test/"

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Stop services
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "sudo systemctl stop sh-platform-auth sh-platform-scraper 2>/dev/null; sudo fuser -k 8080/tcp 8081/tcp 2>/dev/null; echo STOP_OK"

      - name: Git pull via HTTPS
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "cd /home/ubuntu/sh-platform && git remote set-url origin https://github.com/SungHoonGit/sh-platform.git && git stash 2>/dev/null; git fetch origin 2>&1; git reset --hard origin/master 2>&1"

      - name: Build backend
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=300 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "cd /home/ubuntu/sh-platform && ./gradlew :modules:auth:backend:clean :modules:auth:backend:build :modules:scraper:backend:build -q"

      - name: Build frontend scraper
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=300 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "cd /home/ubuntu/sh-platform/modules/scraper/frontend && npm ci && npx tsc --noEmit && npm run build"

      - name: Build frontend platform
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=300 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "cd /home/ubuntu/sh-platform/platform/frontend && npm ci && npx tsc --noEmit && npm run build"

      - name: Fix nginx (SPA fallback + scraper-ui location)
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "cd /home/ubuntu/sh-platform && python3 scripts/fix-nginx.py"

      - name: Start services
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=120 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "
          echo '=== Current service status ===';
          sudo systemctl status sh-platform-auth --no-pager 2>&1 || echo 'Service sh-platform-auth not found';
          echo;
          echo '=== Auth unit file ===';
          sudo systemctl cat sh-platform-auth 2>&1 || echo 'No unit file found';
          echo;
          echo '=== JAR files ===';
          ls -la /home/ubuntu/sh-platform/modules/auth/backend/build/libs/ 2>&1 || echo 'No JARs found';
          ls -la /home/ubuntu/sh-platform/modules/scraper/backend/build/libs/ 2>&1 || echo 'No scraper JARs found';
        "

      - name: Fix service paths if needed
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "
          # Find actual JAR files
          AUTH_JAR=\$(ls /home/ubuntu/sh-platform/modules/auth/backend/build/libs/*.jar 2>/dev/null | head -1);
          SCRAPER_JAR=\$(ls /home/ubuntu/sh-platform/modules/scraper/backend/build/libs/*.jar 2>/dev/null | head -1);
          echo 'Auth JAR:' \$AUTH_JAR;
          echo 'Scraper JAR:' \$SCRAPER_JAR;
          if [ -n \"\$AUTH_JAR\" ]; then
            echo 'Starting auth directly...';
            cd /home/ubuntu/sh-platform;
            sudo -u ubuntu SPRING_PROFILES_ACTIVE=prod nohup java -jar \$AUTH_JAR > /dev/null 2>&1 &
            echo 'Auth started, PID:' \$!;
          fi
          if [ -n \"\$SCRAPER_JAR\" ]; then
            echo 'Starting scraper directly...';
            cd /home/ubuntu/sh-platform;
            sudo -u ubuntu SPRING_PROFILES_ACTIVE=prod nohup java -jar \$SCRAPER_JAR > /dev/null 2>&1 &
            echo 'Scraper started, PID:' \$!;
          fi
        "

      - name: Health check (auth)
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=120 "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" 'for i in $(seq 1 12); do code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/v1/auth/me 2>/dev/null); if [ "$code" = "200" ] || [ "$code" = "401" ]; then echo "Auth up ($code)"; exit 0; fi; echo "Waiting... ($i/12)"; sleep 10; done; echo "Auth failed to start"; exit 1'
