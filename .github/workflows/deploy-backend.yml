name: Deploy Backend (Spring Boot)

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/**"
      - "sh-platform-auth/**"
      - "sh-platform-common/**"
      - "modules/auth/**"
      - "modules/scraper/**"
      - "modules/resume/**"
      - "modules/portfolio/**"
      - "platform/**"
      - "common/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build and Test with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :modules:auth:backend:build :modules:scraper:backend:build

      - name: Build Frontend (scraper)
        run: |
          cd modules/scraper/frontend
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Build Frontend (platform)
        run: |
          cd platform/frontend
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-report
          path: "**/build/reports/tests/test/"

      - name: SSH Auth Test
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass >/dev/null 2>&1
          set +e
          output=$(sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 \
            "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_WEB_HOST }}" "hostname" 2>&1)
          ec=$?
          echo "::group::SSH Debug"
          echo "exit_code=$ec"
          echo "$output"
          echo "::endgroup::"
          echo "ssh_status=$ec" >> "$GITHUB_OUTPUT"
          if [ $ec -ne 0 ]; then
            echo "::error title=SSH Auth Failed::$output"
            exit 1
          fi
        id: ssh_test

      - name: Deploy via SSH
        env:
          SSHPASS: ${{ secrets.OCI_SSH_PW }}
        run: |
          host="${{ secrets.OCI_WEB_HOST }}"
          user="${{ secrets.OCI_SSH_USER }}"

          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 "${user}@${host}" '
            set -e

            sudo systemctl stop sh-platform 2>/dev/null || true

            cd /home/ubuntu/sh-platform
            git pull origin master

            ./gradlew :modules:auth:backend:clean :modules:auth:backend:build :modules:scraper:backend:build -q

            cd /home/ubuntu/sh-platform/modules/scraper/frontend
            npm ci && npx tsc --noEmit && npm run build

            cd /home/ubuntu/sh-platform/platform/frontend
            npm ci && npx tsc --noEmit && npm run build

            sudo systemctl start sh-platform
            echo "Deploy complete!"
          '
