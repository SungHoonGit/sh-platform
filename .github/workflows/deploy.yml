name: Deploy to OCI

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :sh-platform-auth:build -x test

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 10.0.0.39
          username: ubuntu
          password: ${{ secrets.OCI_SSH_PW }}
          script: |
            set -e

            sudo systemctl stop sh-platform 2>/dev/null || true

            cd /home/ubuntu/sh-platform
            git pull origin main

            ln -sf ~/gradlew gradlew 2>/dev/null || true
            ./gradlew :sh-platform-auth:clean :sh-platform-auth:build -x test -q

            sudo systemctl start sh-platform
            echo "Deploy complete!"
