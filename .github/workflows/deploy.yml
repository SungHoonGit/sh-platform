name: Deploy to OCI

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          cd sh-platform-auth
          chmod +x gradlew
          ./gradlew build -x test

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 140.245.95.162
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -e

            sudo systemctl stop sh-platform 2>/dev/null || true

            cd /home/ubuntu/sh-platform
            git pull origin master

            cd sh-platform-auth
            chmod +x gradlew
            ./gradlew clean build -x test -q

            sudo systemctl start sh-platform
            echo "Deploy complete!"
