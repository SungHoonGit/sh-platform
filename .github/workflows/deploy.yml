name: Deploy to OCI

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          cd sh-platform-core
          chmod +x gradlew
          ./gradlew build -x test

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 140.245.95.162
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -e

            # 기존 앱 중지
            sudo systemctl stop sh-platform 2>/dev/null || true

            # jar 배포
            mkdir -p /home/ubuntu/sh-platform
            cd /home/ubuntu/sh-platform
            git pull

            # Spring Boot 실행
            nohup java -jar sh-platform-core/build/libs/*.jar --spring.profiles.active=prod > /tmp/sh-platform.log 2>&1 &
            echo "Deploy complete!"
