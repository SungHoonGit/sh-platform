# Auth
DUPLICATE_EMAIL=Email is already in use.
UNAUTHORIZED=Invalid email or password.
EMAIL_NOT_VERIFIED=Email has not been verified.
TOKEN_EXPIRED=Token has expired. Please log in again.
TOKEN_INVALID=Invalid token.
INVALID_CODE=Invalid verification code.
CODE_EXPIRED=Verification code has expired.

# OAuth2
OAUTH2_FAILED=Social login failed.
OAUTH2_USER_NOT_FOUND=Social login user not found.
OAUTH2_PROVIDER_ERROR=Error communicating with social login provider.
RATE_LIMITED=Too many requests. Please try again later.

# Common
INTERNAL_ERROR=An internal server error occurred.
NOT_FOUND=The requested resource was not found.
INVALID_INPUT=Invalid input.
FORBIDDEN=Access denied.
