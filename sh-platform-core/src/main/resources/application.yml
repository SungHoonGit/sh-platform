spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  messages:
    basename: messages/messages
    encoding: UTF-8
    fallback-to-system-locale: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_batch_fetch_size: 100
        format_sql: true
        show_sql: false

  threads:
    virtual:
      enabled: true

server:
  shutdown: graceful

logging:
  level:
    com.shplatform: DEBUG
