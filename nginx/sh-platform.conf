server {
    server_name sunghoonyk.duckdns.org;

    root /var/www/html;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # === Auth API (port 8080) ===
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /oauth2/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /login/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /swagger-ui/ {
        rewrite ^/swagger-ui/$ /swagger-ui/index.html permanent;
        rewrite ^/swagger-ui$ /swagger-ui/index.html permanent;
        proxy_pass http://127.0.0.1:8080/swagger-ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /v3/ {
        proxy_pass http://127.0.0.1:8080/v3/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # === Scraper API (port 8081) ===
    location = /scraper/swagger-ui.html {
        return 302 /scraper/swagger-ui/index.html;
    }
    location = /scraper/swagger-ui {
        return 302 /scraper/swagger-ui/index.html;
    }
    location = /scraper/api-docs-ui {
        return 302 /scraper/swagger-ui/index.html;
    }
    location /scraper/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === Resume API (port 8082) ===
    location = /resume/swagger-ui.html {
        return 302 /resume/swagger-ui/index.html;
    }
    location = /resume/swagger-ui {
        return 302 /resume/swagger-ui/index.html;
    }
    location = /resume/api-docs-ui {
        return 302 /resume/swagger-ui/index.html;
    }
    location /resume/ {
        proxy_pass http://127.0.0.1:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === Portfolio API (port 8083) ===
    location = /portfolio/swagger-ui.html {
        return 302 /portfolio/swagger-ui/index.html;
    }
    location = /portfolio/swagger-ui {
        return 302 /portfolio/swagger-ui/index.html;
    }
    location = /portfolio/api-docs-ui {
        return 302 /portfolio/swagger-ui/index.html;
    }
    location /portfolio/ {
        proxy_pass http://127.0.0.1:8083/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === Static files ===
    location /test-reports/ {
        alias /home/ubuntu/sh-platform/modules/auth/backend/build/reports/tests/test/;
        autoindex on;
    }
    location /schemaSpy/ {
        alias /var/www/schemaSpy/;
        index index.html;
        autoindex on;
    }
    location /javadoc/ {
        alias /home/ubuntu/sh-platform/modules/auth/backend/build/docs/javadoc/;
        autoindex on;
    }
    location /scraper/test-reports/ {
        alias /home/ubuntu/sh-platform/modules/scraper/backend/build/reports/tests/test/;
        autoindex on;
    }
    location /scraper/javadoc/ {
        alias /home/ubuntu/sh-platform/modules/scraper/backend/build/docs/javadoc/;
        autoindex on;
    }

    # === Monitoring ===
    location /prometheus/ {
        proxy_pass http://127.0.0.1:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /grafana/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === Webhook ===
    location /webhook {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # === Scraper Frontend (module) ===
    location /platform/scraper/ {
        alias /home/ubuntu/sh-platform/modules/scraper/frontend/dist/;
        try_files $uri $uri/ /platform/scraper/index.html;
    }

    # === Platform Frame ===
    location /platform {
        alias /home/ubuntu/sh-platform/platform/frontend/dist;
        try_files $uri $uri/ /platform/index.html;
    }

    # === Scraper SPA Frontend ===
    location = /scraper-ui {
        return 301 /scraper-ui/;
    }
    location /scraper-ui/ {
        alias /home/ubuntu/sh-platform/modules/scraper/frontend/dist/;
        error_page 404 = /scraper-ui/index.html;
    }

    # === Auth Frontend ===
    location = / {
        root /home/ubuntu/sh-platform/modules/auth/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/sunghoonyk.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sunghoonyk.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = sunghoonyk.duckdns.org) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name sunghoonyk.duckdns.org;
    return 444;
}
